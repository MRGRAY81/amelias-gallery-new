<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Amelia's Gallery</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/config.js"></script>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255, 240, 245, 0.9) 0%, rgba(255, 228, 225, 0.9) 100%);
    }
    
    .login-panel {
      max-width: 400px;
      width: 90%;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .login-panel h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      color: #2a2a2a;
      font-size: 2rem;
    }
    
    .login-panel p {
      text-align: center;
      margin-bottom: 2rem;
      color: #6a6a6a;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-panel">
      <h1>Admin Login</h1>
      <p>Amelia's Gallery</p>
      
      <div id="alertContainer"></div>
      
      <form id="loginForm" data-testid="admin-login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required data-testid="admin-email-input">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required data-testid="admin-password-input">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;" data-testid="admin-login-submit-btn">Login</button>
      </form>
      
      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/index.html" style="color: #c49090; text-decoration: none; font-size: 0.9rem;">← Back to Gallery</a>
      </div>
    </div>
  </div>

  <script>
    async function checkHealth() {
      try {
        const response = await fetch(`${window.BACKEND_URL}/api/health`);
        const data = await response.json();
        console.log('Backend status:', data);
      } catch (error) {
        console.error('Backend health check failed:', error);
      }
    }
    
    checkHealth();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const credentials = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };
      
      try {
        const response = await fetch(`${window.BACKEND_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(credentials)
        });
        
        const alertContainer = document.getElementById('alertContainer');
        
        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminData', JSON.stringify(data.admin));
          window.location.href = '/admin/index.html';
        } else {
          alertContainer.innerHTML = '<div class="alert alert-error" data-testid="login-error-message">Invalid email or password.</div>';
        }
      } catch (error) {
        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = '<div class="alert alert-error" data-testid="login-error-message">Login failed. Please try again.</div>';
      }
    });
  </script>
</body>
</html>
