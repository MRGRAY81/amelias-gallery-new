<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Amelia's Gallery</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/config.js"></script>
</head>
<body>
  <div class="page-wrapper" style="background-image: url('/assets/images/blossom-bg.png');">
    <header>
      <h1 class="site-title">Amelia's Gallery</h1>
      <nav>
        <a href="/index.html" data-testid="nav-home">Home</a>
        <a href="/gallery.html" data-testid="nav-gallery">Gallery</a>
        <a href="/about.html" data-testid="nav-about">About</a>
        <a href="/contact.html" data-testid="nav-contact">Contact (For inquiries/Commissions)</a>
      </nav>
      <a href="/admin/login.html" class="admin-secret-hotspot" data-testid="admin-secret-hotspot" aria-label="Admin access"></a>
    </header>

    <main>
      <div class="content-panel" data-testid="contact-form-panel">
        <h2>Contact (For inquiries/Commissions)</h2>
        <p>Have a question or interested in commissioning a custom piece? We'd love to hear from you.</p>
        
        <div id="alertContainer"></div>
        
        <form id="contactForm" data-testid="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required data-testid="contact-name-input">
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required data-testid="contact-email-input">
          </div>
          
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required data-testid="contact-subject-input">
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required data-testid="contact-message-input"></textarea>
          </div>
          
          <button type="submit" class="btn" data-testid="contact-submit-btn">Send Message</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    let keyBuffer = '';
    let keyTimer;

    document.addEventListener('keypress', (e) => {
      clearTimeout(keyTimer);
      keyBuffer += e.key.toLowerCase();
      
      if (keyBuffer.includes('amelia')) {
        window.location.href = '/admin/login.html';
      }
      
      keyTimer = setTimeout(() => {
        keyBuffer = '';
      }, 2000);
    });

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value
      };
      
      try {
        const response = await fetch(`${window.BACKEND_URL}/api/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        const alertContainer = document.getElementById('alertContainer');
        
        if (response.ok) {
          alertContainer.innerHTML = '<div class="alert alert-success" data-testid="contact-success-message">Thank you! Your message has been sent successfully.</div>';
          document.getElementById('contactForm').reset();
        } else {
          alertContainer.innerHTML = '<div class="alert alert-error" data-testid="contact-error-message">Sorry, there was an error sending your message. Please try again.</div>';
        }
      } catch (error) {
        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = '<div class="alert alert-error" data-testid="contact-error-message">Sorry, there was an error sending your message. Please try again.</div>';
      }
    });
  </script>
</body>
</html>
